services:
  db:
    image: postgres:17-alpine
    container_name: largence-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: largence_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: largence-redis
    restart: always
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: largence-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: largence-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: largence-api
    depends_on:
      - db
      - redis
      - kafka
      - minio
      - opensearch
    environment:
      DATABASE_URL: "postgresql://postgres:password@db:5432/largence_db?schema=public"
      REDIS_URL: "redis://redis:6379"
      KAFKA_BROKERS: "kafka:9092"
      AWS_S3_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "largence_admin"
      AWS_SECRET_ACCESS_KEY: "largence_password"
      AWS_S3_BUCKET: "largence-documents"
      OPENSEARCH_NODE: "http://opensearch:9200"
      NODE_ENV: production
      PORT: 3001
      BASE_DOMAIN: "largence.com"
    env_file:
      - apps/api/.env
    ports:
      - "3001:3001"

  minio:
    image: minio/minio:latest
    container_name: largence-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: largence_admin
      MINIO_ROOT_PASSWORD: largence_password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: largence-opensearch
    restart: always
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "DISABLE_SECURITY_PLUGIN=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"

volumes:
  postgres_data:
  minio_data:
  opensearch_data:
